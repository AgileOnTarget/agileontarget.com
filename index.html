    <script>
        const egg = document.getElementById('egg');
        const eggLink = document.getElementById('eggLink');
        const DWELL_MS = 3000;
        const FADE_MS = 2000;
        const NAV_DELAY_MS = 280;
        const LINK_URL = 'https://www.linkedin.com/in/thomasfriend/';
        let dwellTimer = null;
        let fadeTimer = null;
        let longPressSucceeded = false;
        let pointerIsDown = false;
        function clearAllTimers() { if (dwellTimer) { clearTimeout(dwellTimer); dwellTimer = null; } if (fadeTimer) { clearTimeout(fadeTimer); fadeTimer = null; } }
        function startDwell() { clearAllTimers(); dwellTimer = setTimeout(() => { egg.classList.add('dwelled'); longPressSucceeded = true; dwellTimer = null; }, DWELL_MS); }
        function endDwell() { if (dwellTimer) { clearTimeout(dwellTimer); dwellTimer = null; } if (egg.classList.contains('dwelled')) { fadeTimer = setTimeout(() => { egg.classList.remove('dwelled'); fadeTimer = null; }, FADE_MS); } }
        function animateEgg() { egg.style.transition = 'transform 0.6s cubic-bezier(0.16, 1, 0.3, 1)'; egg.style.transform = 'translateY(-5px) scale(1.02)'; setTimeout(() => { egg.style.transform = 'translateY(0) scale(1)'; }, 600); }
        function navigate() { window.open(LINK_URL, '_blank', 'noopener,noreferrer'); }
        egg.addEventListener('pointerenter', (e) => { if (e.pointerType === 'mouse') { startDwell(); } });
        egg.addEventListener('pointerleave', (e) => { if (e.pointerType === 'mouse') { endDwell(); } });
        egg.addEventListener('pointercancel', () => { endDwell(); pointerIsDown = false; });
        egg.addEventListener('pointerdown', (e) => { if (e.pointerType === 'touch') { pointerIsDown = true; longPressSucceeded = false; startDwell(); } });
        egg.addEventListener('pointerup', (e) => { if (e.pointerType === 'touch') { if (dwellTimer) { clearTimeout(dwellTimer); dwellTimer = null; } pointerIsDown = false; if (longPressSucceeded) { longPressSucceeded = false; endDwell(); } } });
        eggLink.addEventListener('click', (e) => { e.preventDefault(); if (longPressSucceeded) { longPressSucceeded = false; return; } animateEgg(); setTimeout(navigate, NAV_DELAY_MS); });
        eggLink.addEventListener('focus', () => { startDwell(); });
        eggLink.addEventListener('blur', () => { endDwell(); });
        eggLink.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); animateEgg(); setTimeout(navigate, NAV_DELAY_MS); } });
    </script>
